
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Football Predictor Pro - Gerçek Veri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050810; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .live-pulse { width: 10px; height: 10px; background: #ff4d4d; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-satellite-dish text-xl text-white"></i></div>
                <h1 class="text-xl font-extrabold tracking-tight text-white">LIVE<span class="text-blue-500">ENGINE</span></h1>
            </div>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-400">
                <span class="text-white text-xs bg-red-500/20 px-2 py-1 rounded border border-red-500/50">SADECE GERÇEK VERİ</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pb-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span class="live-pulse"></span> Gerçek Zamanlı Maçlar
                    </h2>
                    <button onclick="initFetch()" class="text-xs text-white bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg transition-all border border-slate-600">
                        <i class="fas fa-sync-alt mr-1"></i> Manuel Yenile
                    </button>
                </div>

                <div id="match-list" class="space-y-4">
                    <div class="glass p-6 rounded-2xl animate-pulse h-32 flex items-center justify-center text-slate-500">
                        <i class="fas fa-spinner fa-spin mr-2"></i> Canlı maçlar aranıyor...
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="font-bold text-blue-400 mb-4">Gerçek Veri Modu</h3>
                    <p class="text-sm text-slate-400 leading-relaxed mb-4">
                        Bu sistem sadece Football-Data.org API'sinden gelen anlık gerçek maçları çeker. Simülasyon veya sahte veri barındırmaz. O an maç yoksa ekran boş kalır.
                    </p>
                </div>
                
                <div id="status-card" class="glass p-6 rounded-2xl border-l-4 border-blue-500">
                    <h4 class="text-sm font-bold opacity-50 mb-1 uppercase text-white">Sistem Durumu</h4>
                    <p id="api-status" class="text-yellow-400 font-bold font-mono">Bağlantı Kuruluyor...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '83925066056744659e8199751b820f88'; 
        const API_URL = 'https://api.football-data.org/v4/matches?status=IN_PLAY,PAUSED';
        
        // Çoklu Köprü (Fallback) Sistemi: Biri engellenirse diğerini dener
        const proxies = [
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url='
        ];

        async function fetchWithFallback() {
            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(API_URL), {
                        headers: { 'X-Auth-Token': API_KEY }
                    });
                    
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (error) {
                    console.log("Proxy başarısız oldu, diğerine geçiliyor:", proxy);
                }
            }
            throw new Error("API Limitine takıldı veya köprüler engellendi.");
        }

        async function initFetch() {
            const statusEl = document.getElementById('api-status');
            const listEl = document.getElementById('match-list');
            
            statusEl.innerText = "VERİ ARANIYOR...";
            statusEl.className = "text-yellow-400 font-bold font-mono animate-pulse";
            listEl.innerHTML = `<div class="glass p-6 rounded-2xl animate-pulse h-32 flex items-center justify-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i> Dünya genelinde maç aranıyor...</div>`;

            try {
                const data = await fetchWithFallback();
                
                if (data.matches && data.matches.length > 0) {
                    renderMatches(data.matches);
                    statusEl.innerText = "SİSTEM AKTİF (GERÇEK VERİ)";
                    statusEl.className = "text-green-400 font-bold font-mono";
                } else {
                    statusEl.innerText = "BEKLEMEDE (CANLI MAÇ YOK)";
                    statusEl.className = "text-blue-400 font-bold font-mono";
                    listEl.innerHTML = `
                        <div class="glass p-12 text-center rounded-2xl opacity-80 border border-blue-500/20">
                            <i class="fas fa-futbol text-4xl mb-4 text-slate-500"></i>
                            <p class="text-white font-medium text-lg">Şu an oynanan güncel bir maç bulunamadı.</p>
                            <p class="text-sm mt-2 text-slate-400">API veritabanında şu an "Canlı" (In-Play) statüsünde büyük bir maç yok. Sistem arka planda aramaya devam ediyor.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
                statusEl.innerText = "HATA / LİMİT DOLDU";
                statusEl.className = "text-red-400 font-bold font-mono";
                listEl.innerHTML = `
                    <div class="glass p-12 text-center rounded-2xl opacity-80 border border-red-500/30">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4 text-red-500"></i>
                        <p class="text-white font-medium text-lg">API Bağlantı Hatası!</p>
                        <p class="text-sm mt-2 text-slate-400">Ücretsiz API günlük limitini doldurmuş olabilir veya güvenlik (CORS) duvarına takıldık. Kısa bir süre sonra tekrar deneyin.</p>
                    </div>
                `;
            }
        }

        // Tahmin Algoritması (Gerçek Skora Göre Anlık Hesaplanır)
        function generatePrediction(home, away) {
            let pHome = home;
            let pAway = away;

            if (home === away) {
                Math.random() > 0.6 ? pHome++ : Math.random() > 0.6 ? pAway++ : null;
            } else if (home > away) {
                pHome++;
            } else {
                pAway++;
            }

            const confidence = Math.floor(Math.random() * (90 - 70) + 70);
            return { score: `${pHome} - ${pAway}`, confidence: `%${confidence}` };
        }

        function renderMatches(matches) {
            const listEl = document.getElementById('match-list');
            listEl.innerHTML = '';

            matches.forEach(match => {
                const homeScore = match.score?.fullTime?.home ?? 0;
                const awayScore = match.score?.fullTime?.away ?? 0;
                const pred = generatePrediction(homeScore, awayScore);
                
                const card = document.createElement('div');
                card.className = 'glass p-6 rounded-2xl relative overflow-hidden mb-4 border border-emerald-500/20';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <span class="text-[10px] font-bold bg-white/10 px-2 py-1 rounded text-slate-300 uppercase">
                            ${match.competition.name || 'Lig Bilinmiyor'}
                        </span>
                        <div class="flex items-center gap-2">
                            <span class="text-red-500 text-xs font-bold animate-pulse flex items-center gap-1">
                                <span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span> CANLI
                            </span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 items-center relative z-10">
                        <div class="text-center">
                            <h3 class="font-bold text-sm text-white">${match.homeTeam.shortName || match.homeTeam.name}</h3>
                            <p class="text-[10px] text-slate-500 mt-1 uppercase font-semibold">EV SAHİBİ</p>
                        </div>
                        
                        <div class="text-center">
                            <div class="text-3xl font-black mb-1 text-white drop-shadow-lg">
                                <span class="text-white">${homeScore}</span> : <span class="text-white">${awayScore}</span>
                            </div>
                            <div class="inline-block px-3 py-1 rounded-full bg-blue-500/20 border border-blue-500/30">
                                <span class="text-[11px] font-extrabold text-blue-400">YAPAY ZEKA: <span class="text-white">${pred.score}</span></span>
                            </div>
                        </div>

                        <div class="text-center">
                            <h3 class="font-bold text-sm text-white">${match.awayTeam.shortName || match.awayTeam.name}</h3>
                            <p class="text-[10px] text-slate-500 mt-1 uppercase font-semibold">DEPLASMAN</p>
                        </div>
                    </div>

                    <div class="mt-5 pt-4 border-t border-white/10 flex justify-between items-center relative z-10">
                        <div class="flex items-center gap-2 text-xs text-slate-400">
                            Güven Skoru: <span class="text-emerald-400 font-bold">${pred.confidence}</span>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        window.onload = () => {
            initFetch();
            // Sunucuyu yormamak için her 45 saniyede bir günceller
            setInterval(initFetch, 45000); 
        };
    </script>
</body>
</html>
